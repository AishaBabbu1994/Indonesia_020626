<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia_020626 - Investigación con fuentes</title>
    <style>
        /* ===== ESTILOS (mismos que antes, pero más limpios) ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #fef9e6, #fff0e0);
            min-height: 100vh;
        }
        #chatbot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 430px;
            height: 700px;
            background: #fffdf8;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(200, 60, 30, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ffcc80;
            z-index: 9999;
        }
        #chat-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #chat-header h3 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .api-badge {
            background: rgba(255,255,240,0.25);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        #api-config-bar {
            background: #fff2e6;
            padding: 12px 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffe0cc;
            align-items: center;
        }
        #api-key-input {
            flex: 2;
            padding: 8px 12px;
            border: 1px solid #ffc8a2;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        #save-api-btn {
            background: #c1121f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
        }
        #api-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 30px;
            background: #f8d7da;
            color: #721c24;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fefcf5;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #c1121f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #fce9e6;
            color: #2d3e50;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #e63946;
        }
        .sources-block {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 2px dashed #ffb4a2;
            font-size: 0.8rem;
        }
        .source-category {
            margin-bottom: 10px;
        }
        .category-title {
            font-weight: bold;
            color: #b22234;
            margin-bottom: 5px;
        }
        .source-link {
            display: block;
            margin: 4px 0;
            padding: 5px 8px;
            background: #fff2ef;
            border-radius: 20px;
            text-decoration: none;
            color: #2c3e66;
            font-size: 0.8rem;
        }
        .source-link:hover {
            background: #ffe0d9;
            padding-left: 12px;
        }
        #chat-input-container {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #ffe0cc;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ffc8a2;
            border-radius: 30px;
            resize: none;
            font-family: inherit;
            font-size: 15px;
            background: #fffaf5;
        }
        #send-btn {
            background: #c1121f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:disabled {
            background: #e6bcb4;
            cursor: not-allowed;
        }
        .error-text {
            color: #b53b2c;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        @media (max-width: 500px) {
            #chatbot { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            #api-config-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div id="chatbot">
    <div id="chat-header">
        <h3>🇮🇩 Indonesia_020626 <span style="font-size:0.7rem;">MCP · Fuentes</span></h3>
        <div class="api-badge" id="key-indicator">🔑 API Key</div>
    </div>
    <div id="api-config-bar">
        <input type="text" id="api-key-input" placeholder="Ingresa tu API Key de Groq (gsk_...)" autocomplete="off">
        <button id="save-api-btn">Guardar clave</button>
        <span id="api-status">⚪ Sin clave</span>
    </div>
    <div id="chat-messages">
        <div class="message bot">
            🌏 <strong>Indonesia_020626 - Asistente de Investigación</strong><br>
            🔍 Fuentes: <strong>Wikipedia + Google Académico (Labs)</strong><br>
            ✅ <strong>Primero guarda tu API Key de Groq</strong> arriba.<br>
            Luego escribe tu tema y recibirás un resumen + enlaces.
        </div>
    </div>
    <div id="chat-input-container">
        <textarea id="chat-input" rows="1" placeholder="Ej: 'Cambio climático en Indonesia'..."></textarea>
        <button id="send-btn">🔎 Investigar</button>
    </div>
</div>

<script>
    // #######################################################################
    //  CONFIGURACIÓN GLOBAL
    // #######################################################################
    const GROQ_API_BASE = 'https://api.groq.com/openai/v1/chat/completions';
    const MODEL = 'llama-3.3-70b-versatile';
    
    // DOM elements
    const messagesDiv = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveApiBtn = document.getElementById('save-api-btn');
    const apiStatusSpan = document.getElementById('api-status');
    const keyIndicator = document.getElementById('key-indicator');
    
    // Estado
    let currentApiKey = localStorage.getItem('groq_api_key') || '';
    let conversation = [
        { role: "system", content: "Eres Indonesia_020626, un asistente de investigación. Respondes en español, con claridad y objetividad. Proporcionas información útil y después de tu respuesta el sistema añadirá enlaces a fuentes confiables (Wikipedia y Google Académico)." }
    ];
    
    // #######################################################################
    //  FUNCIONES UI
    // #######################################################################
    function updateApiStatusUI() {
        if (currentApiKey && currentApiKey.trim().startsWith('gsk_')) {
            apiStatusSpan.innerHTML = '✅ Clave activa';
            apiStatusSpan.style.background = '#d4edda';
            apiStatusSpan.style.color = '#155724';
            sendBtn.disabled = false;
        } else if (currentApiKey) {
            apiStatusSpan.innerHTML = '⚠️ Formato incorrecto (gsk_)';
            apiStatusSpan.style.background = '#fff3cd';
            apiStatusSpan.style.color = '#856404';
            sendBtn.disabled = true;
        } else {
            apiStatusSpan.innerHTML = '🔴 Sin clave';
            apiStatusSpan.style.background = '#f8d7da';
            apiStatusSpan.style.color = '#721c24';
            sendBtn.disabled = true;
        }
        apiKeyInput.value = currentApiKey;
    }
    
    function saveApiKey() {
        const newKey = apiKeyInput.value.trim();
        if (newKey && newKey.startsWith('gsk_')) {
            localStorage.setItem('groq_api_key', newKey);
            currentApiKey = newKey;
            updateApiStatusUI();
            addBotMessage("🔑 API Key guardada. ¡Listo para investigar!");
        } else if (newKey) {
            addBotMessage("❌ La clave debe empezar con 'gsk_'. Verifica en console.groq.com");
        } else {
            localStorage.removeItem('groq_api_key');
            currentApiKey = '';
            updateApiStatusUI();
            addBotMessage("❌ Clave eliminada.");
        }
    }
    
    function addMessage(sender, htmlContent) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerHTML = htmlContent; // Confiamos en que el contenido es seguro (solo enlaces y texto)
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addBotMessage(text) {
        addMessage('bot', text);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // #######################################################################
    //  MCP: FUENTES (WIKIPEDIA + GOOGLE ACADÉMICO LABS)
    // #######################################################################
    async function fetchWikipedia(query) {
        try {
            const searchTerm = query.trim();
            // Primero intentamos obtener el resumen directo (si es un artículo exacto)
            const summaryUrl = `https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchTerm)}`;
            let resp = await fetch(summaryUrl, { headers: { 'Api-User-Agent': 'IndonesiaBot/1.0' } });
            let sources = [];
            if (resp.ok) {
                const data = await resp.json();
                if (data.title && data.content_urls?.desktop?.page) {
                    sources.push({
                        title: data.title,
                        url: data.content_urls.desktop.page,
                        desc: data.extract ? data.extract.substring(0, 120) : "Artículo Wikipedia"
                    });
                    return sources;
                }
            }
            // Si no, búsqueda general
            const searchApi = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}&format=json&origin=*&srlimit=2`;
            const searchResp = await fetch(searchApi);
            const searchData = await searchResp.json();
            if (searchData.query && searchData.query.search) {
                for (let item of searchData.query.search) {
                    sources.push({
                        title: item.title,
                        url: `https://es.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`,
                        desc: item.snippet ? item.snippet.replace(/<[^>]*>/g, '') : "Resultado Wikipedia"
                    });
                }
            }
            return sources.slice(0, 2);
        } catch (error) {
            console.error("Error Wikipedia:", error);
            return [];
        }
    }
    
    // Google Académico versión Labs
    function getGoogleScholarLink(query) {
        const url = `https://scholar.google.com/scholar_labs/search?hl=es&q=${encodeURIComponent(query)}`;
        return [{
            title: `Buscar "${query}" en Google Académico (Labs)`,
            url: url,
            desc: "Artículos, tesis, libros académicos"
        }];
    }
    
    async function gatherAllSources(query) {
        const wikiResults = await fetchWikipedia(query);
        const googleResults = getGoogleScholarLink(query);
        return { wikipedia: wikiResults, googleScholar: googleResults };
    }
    
    function renderSourcesBlock(sources) {
        let html = `<div class="sources-block">`;
        if (sources.wikipedia && sources.wikipedia.length > 0) {
            html += `<div class="source-category"><div class="category-title">📖 Wikipedia</div>`;
            for (let s of sources.wikipedia) {
                html += `<a href="${s.url}" target="_blank" rel="noopener" class="source-link">🌐 ${escapeHtml(s.title)} — ${escapeHtml(s.desc)}</a>`;
            }
            html += `</div>`;
        }
        if (sources.googleScholar && sources.googleScholar.length > 0) {
            html += `<div class="source-category"><div class="category-title">🔎 Google Académico (Labs)</div>`;
            for (let s of sources.googleScholar) {
                html += `<a href="${s.url}" target="_blank" rel="noopener" class="source-link">📚 ${escapeHtml(s.title)} — ${escapeHtml(s.desc)}</a>`;
            }
            html += `</div>`;
        }
        if (!sources.wikipedia.length && !sources.googleScholar.length) {
            html += `<div class="error-text">⚠️ No se encontraron fuentes automáticas. Intenta reformular la pregunta.</div>`;
        }
        html += `</div>`;
        return html;
    }
    
    // #######################################################################
    //  ENVÍO PRINCIPAL: GROQ + FUENTES
    // #######################################################################
    async function sendMessage() {
        const userQuery = inputEl.value.trim();
        if (!userQuery) return;
        
        // Validar API Key
        if (!currentApiKey || !currentApiKey.startsWith('gsk_')) {
            addBotMessage("⚠️ No hay API Key válida. Guárdala arriba.");
            return;
        }
        
        // Mostrar mensaje usuario
        addMessage('user', userQuery);
        inputEl.value = '';
        inputEl.style.height = 'auto';
        conversation.push({ role: "user", content: userQuery });
        
        // Deshabilitar botón mientras procesa
        sendBtn.disabled = true;
        sendBtn.textContent = '🔍 Obteniendo fuentes...';
        
        // 1. Obtener fuentes (MCP)
        let sources = { wikipedia: [], googleScholar: [] };
        try {
            sources = await gatherAllSources(userQuery);
            console.log("Fuentes obtenidas:", sources);
        } catch (err) {
            console.error("Error en MCP:", err);
            addBotMessage(`⚠️ Error al buscar fuentes: ${err.message}`);
        }
        
        // 2. Llamada a Groq
        sendBtn.textContent = '🤖 Generando respuesta...';
        let botReply = "";
        try {
            const response = await fetch(GROQ_API_BASE, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentApiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: conversation,
                    temperature: 0.65,
                    max_tokens: 1000
                })
            });
            
            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || `HTTP ${response.status}`);
            }
            
            const data = await response.json();
            botReply = data.choices[0].message.content;
            conversation.push({ role: "assistant", content: botReply });
        } catch (err) {
            console.error("Error Groq:", err);
            botReply = `❌ Error con Groq: ${err.message}. Verifica tu API Key y conexión.`;
        }
        
        // 3. Construir mensaje final (respuesta + fuentes)
        let finalHtml = botReply;
        if (sources.wikipedia.length > 0 || sources.googleScholar.length > 0) {
            finalHtml += renderSourcesBlock(sources);
        } else {
            finalHtml += `<div class="sources-block"><div class="category-title">🔍 No se obtuvieron fuentes adicionales</div><div>Puedes buscar manualmente en los enlaces de Google Académico.</div></div>`;
        }
        
        addMessage('bot', finalHtml);
        
        // Restaurar botón
        sendBtn.disabled = false;
        sendBtn.textContent = '🔎 Investigar';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // #######################################################################
    //  EVENTOS E INICIALIZACIÓN
    // #######################################################################
    saveApiBtn.addEventListener('click', saveApiKey);
    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    inputEl.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.value === '') this.style.height = 'auto';
    });
    keyIndicator.addEventListener('click', () => {
        document.getElementById('api-config-bar').scrollIntoView({ behavior: 'smooth' });
        apiKeyInput.focus();
    });
    
    // Inicializar
    updateApiStatusUI();
    if (!currentApiKey) {
        addBotMessage("🔑 Para empezar, ingresa tu API Key de Groq (consíguela gratis en console.groq.com)");
    } else {
        addBotMessage("✅ API Key cargada. ¡Pregúntame sobre cualquier tema!");
    }
</script>
</body>
</html>
